adserver {
    server {
        host = "0.0.0.0"
        port = 8080
        port = ${?ADSERVER_PORT}
    }
    inventory {
        jdbcUrl = "jdbc:postgresql://localhost:5432/kotlin_ad_server"
        jdbcUrl = ${?INVENTORY_JDBC_URL}
        user = "kotlin_ad_server"
        user = ${?INVENTORY_DB_USER}
        password = "kotlin_ad_server"
        password = ${?INVENTORY_DB_PASSWORD}
        skipMigrate = false
        skipMigrate = ${?INVENTORY_SKIP_MIGRATE}
    }
    frequency {
        host = "localhost"
        host = ${?FREQ_SERVICE_HOST}
        port = 9090
        port = ${?FREQ_SERVICE_PORT}
        timeoutMs = 8
        timeoutMs = ${?FREQ_SERVICE_TIMEOUT_MS}
    }
    kafka {
        bootstrapServers = "localhost:29092"
        bootstrapServers = ${?KAFKA_BOOTSTRAP_SERVERS}
        schemaRegistryUrl = "http://localhost:8081"
        schemaRegistryUrl = ${?SCHEMA_REGISTRY_URL}
        topicAuctionResults = "auction-results"
        topicAuctionResults = ${?KAFKA_TOPIC_AUCTION_RESULTS}
        topicImpressionEvents = "impression-events"
        topicImpressionEvents = ${?KAFKA_TOPIC_IMPRESSION_EVENTS}
        lingerMs = 5
        lingerMs = ${?KAFKA_LINGER_MS}
        # ProducerFactory enables idempotence, which requires acks=all
        acks = "all"
        acks = ${?KAFKA_ACKS}
    }
}
