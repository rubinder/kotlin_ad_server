global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: ad-server
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics

  - job_name: frequency-service
    static_configs:
      - targets: ["host.docker.internal:9091"]
    metrics_path: /metrics
